          - text: Descripción del Puesto
        - paragraph [ref=e391]: En DCA INGENIEROS SAC, cada día representa una oportunidad para crecer, aprender y asumir nuevos retos. Buscamos un profesional con experiencia liderando actividades administrativas y contables en obra, con capacidad de planificación, organización y negociación con proveedores.
      - generic [ref=e392]:
        - heading "Responsabilidades" [level=4] [ref=e393]:
          - img [ref=e394]
          - text: Responsabilidades
        - list [ref=e397]:
          - listitem [ref=e398]: Planificar, organizar y liderar las actividades del área administrativa del proyecto.
          - listitem [ref=e400]: Gestionar y administrar las garantías financieras (cartas fianza y seguros) de subcontratos.
          - listitem [ref=e402]: Aprobar valorizaciones y programar pagos a proveedores.
          - listitem [ref=e404]: Elaborar y administrar contratos de proveedores de bienes y servicios.
          - listitem [ref=e406]: Controlar y dar seguimiento a las facturas por pagar.
          - listitem [ref=e408]: Supervisar los almacenes del proyecto.
