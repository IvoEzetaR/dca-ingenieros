          - listitem [ref=e418]: Experiencia laboral mínima de 8 años en el área administrativa, contable y/o financiera.
          - listitem [ref=e420]: Al menos 5 años en cargos de liderazgo administrativo o contable (pref. construcción).
          - listitem [ref=e422]: Conocimientos indispensables en Excel avanzado y SAP (FI, MM).
